# Install once: `uv run pre-commit install`
# Refresh hook revisions: `uv run pre-commit autoupdate`
# Run on every file (not just staged): `uv run pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Local hook so mypy resolves imports against the project's uv-managed env.
      - id: mypy
        name: mypy
        entry: uv run mypy coursesmith
        language: system
        types: [python]
        pass_filenames: false
